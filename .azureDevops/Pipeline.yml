trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  artifactName: 'nuget-packages'

parameters:
  - name: PublishVstsFeed
    type: string
    default: 'Kevin.CleanArchitecture/Nuget.Feed'
  - name: packableProjects
    type: object
    default:
      - name: BusWorks
        path: src/processing/BusWorks/BusWorks.csproj
      - name: BusWorks.Abstractions
        path: src/processing/BusWorks.Abstractions/BusWorks.Abstractions.csproj

stages:
  - stage: CI
    displayName: 'Build, Test & Pack'
    jobs:
      - job: build_test_pack
        displayName: 'Build · Test · Pack'
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true   # required so the pipeline can push git tags

          - task: gitversion/setup@3
            displayName: 'Install GitVersion'
            inputs:
              versionSpec: '6.x'

          - task: gitversion/execute@3
            displayName: 'Determine Version'
            inputs:
              useConfigFile: true
              configFilePath: '.azureDevops/GitVersion.yml'

          # main    → stable  X.Y.Z        (MajorMinorPatch — no pre-release suffix)
          # feature → pre-release X.Y.Z-alpha.N (SemVer)
          - script: |
              if [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
                echo "##vso[task.setvariable variable=PackageVersion]$(GitVersion.MajorMinorPatch)"
              else
                echo "##vso[task.setvariable variable=PackageVersion]$(GitVersion.SemVer)"
              fi
            displayName: 'Set Package Version'

          - script: echo "##[section]Version $(PackageVersion)"
            displayName: 'Log Version'

          # Detect whether this commit actually introduced a new version.
          # Commits matching no-bump-message (chore/docs/refactor/etc.) produce no
          # increment, so MajorMinorPatch would equal the existing tag — in that case
          # we skip pack, tag and publish to avoid duplicate-version errors.
          # Must run BEFORE Pack so the IsNewVersion variable is available to its condition.
          - script: |
              TAG="$(GitVersion.MajorMinorPatch)"
              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "Version $TAG already tagged — no new release needed."
                echo "##vso[task.setvariable variable=IsNewVersion;isOutput=true]false"
              else
                echo "New version detected: $TAG"
                echo "##vso[task.setvariable variable=IsNewVersion;isOutput=true]true"
              fi
            name: versionCheck
            displayName: 'Check Is New Version'
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: '**/*.slnx'
              feedsToUse: 'select'
              vstsFeed: ${{ parameters.PublishVstsFeed }}

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '**/*.slnx'
              arguments: >-
                -c $(buildConfiguration)
                --no-restore
                /p:Version=$(GitVersion.AssemblySemVer)
                /p:InformationalVersion=$(GitVersion.InformationalVersion)

          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: 'tests/**/*.csproj'
              arguments: --configuration $(buildConfiguration) --no-build --coverage --coverage-output-format cobertura --report-trx
              publishTestResults: true

          - ${{ each project in parameters.packableProjects }}:
              - task: DotNetCoreCLI@2
                displayName: 'Pack ${{ project.name }}'
                condition: |
                  and(
                    succeeded(),
                    ne(variables['Build.Reason'], 'PullRequest'),
                    or(
                      ne(variables['Build.SourceBranch'], 'refs/heads/main'),
                      eq(variables['versionCheck.IsNewVersion'], 'true')
                    )
                  )
                inputs:
                  command: 'pack'
                  packagesToPack: '${{ project.path }}'
                  packDirectory: '$(Build.ArtifactStagingDirectory)/packages/nuget'
                  nobuild: true
                  versioningScheme: 'byEnvVar'
                  versionEnvVar: 'PackageVersion'


          # Pushes a lightweight git tag (e.g. 1.0.0) on the merge commit so that
          # GitVersion resolves the correct stable base on every subsequent build.
          #
          # ⚠ One-time setup required in Azure DevOps:
          #   Project Settings → Repositories → Security
          #   → <YourProject> Build Service → Contribute = Allow
          - script: |
              git config user.email "build@pipeline"
              git config user.name "Azure Pipelines"
              git tag "$(GitVersion.MajorMinorPatch)"
              git push origin "$(GitVersion.MajorMinorPatch)"
              echo "##[section]Tagged release as $(GitVersion.MajorMinorPatch)"
            displayName: 'Tag Release Commit'
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['versionCheck.IsNewVersion'], 'true'))

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact'
            condition: |
              and(
                succeeded(),
                ne(variables['Build.Reason'], 'PullRequest'),
                or(
                  ne(variables['Build.SourceBranch'], 'refs/heads/main'),
                  eq(variables['versionCheck.IsNewVersion'], 'true')
                )
              )
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/packages/nuget'
              ArtifactName: '$(artifactName)'

  - stage: PublishInternal
    displayName: 'Publish — Internal Feed'
    dependsOn: CI
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        or(
          ne(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(dependencies.CI.outputs['build_test_pack.versionCheck.IsNewVersion'], 'true')
        )
      )
    jobs:
      - deployment: publish_internal
        displayName: 'Push to Azure Artifacts'
        environment: 'Nuget-publish-internal'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download Packages'
                  inputs:
                    buildType: 'current'
                    artifactName: '$(artifactName)'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: DotNetCoreCLI@2
                  displayName: 'Push to Internal Feed'
                  inputs:
                    command: 'push'
                    packagesToPush: '$(System.ArtifactsDirectory)/**/*.nupkg;!$(System.ArtifactsDirectory)/**/*.symbols.nupkg'
                    nuGetFeedType: 'internal'
                    publishVstsFeed: ${{ parameters.PublishVstsFeed }}
